<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Queue — Library System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1040 50%, #0d1117 100%);
            color: #e0e0e0;
        }

        nav {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky; top: 0; z-index: 100;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-role-badge {
            font-size: 0.7rem; font-weight: 700;
            background: rgba(245,158,11,0.2); color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.35);
            border-radius: 20px; padding: 0.2rem 0.6rem;
            text-transform: uppercase; letter-spacing: 0.06em;
        }

        .nav-left { display: flex; align-items: center; gap: 0.75rem; }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; }

        .nav-links a, .nav-links button {
            padding: 0.45rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c4c9d6;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s, color 0.2s;
        }

        .nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-links a.active { background: rgba(245,158,11,0.15); color: #fbbf24; }

        .logout-btn {
            background: rgba(239,68,68,0.15) !important;
            color: #fca5a5 !important;
            border: 1px solid rgba(239,68,68,0.25) !important;
        }

        main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.9rem; font-weight: 700; color: #f9fafb; }
        .page-header p { color: #9ca3af; font-size: 0.9rem; margin-top: 0.25rem; }

        .alert {
            padding: 0.85rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .alert-success {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }

        /* Table */
        .table-container {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: rgba(255,255,255,0.06); }

        thead th {
            padding: 1rem 1.25rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #9ca3af;
        }

        tbody tr {
            border-top: 1px solid rgba(255,255,255,0.06);
            transition: background 0.15s;
        }

        tbody tr:hover { background: rgba(255,255,255,0.03); }

        tbody td {
            padding: 1rem 1.25rem;
            font-size: 0.88rem;
            color: #d1d5db;
            vertical-align: middle;
        }

        .member-info .member-name {
            font-weight: 600;
            color: #f3f4f6;
            font-size: 0.9rem;
        }

        .member-info .member-email {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-top: 0.15rem;
        }

        .book-title-cell {
            font-weight: 600;
            color: #f3f4f6;
        }

        .date-cell { font-size: 0.85rem; color: #9ca3af; }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-active {
            background: rgba(59,130,246,0.15);
            color: #93c5fd;
            border: 1px solid rgba(59,130,246,0.3);
        }

        .badge-overdue {
            background: rgba(239,68,68,0.12);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        /* Overdue row highlight */
        .overdue-row { background: rgba(239,68,68,0.04) !important; }

        .btn-return {
            padding: 0.45rem 1rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-return:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16,185,129,0.4);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
            color: #6b7280;
        }

        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

        .queue-count {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <div class="nav-brand">📚 Library System</div>
            <span class="nav-role-badge">Librarian</span>
        </div>
        <div class="nav-links">
            <a th:href="@{/librarian/dashboard}">Dashboard</a>
            <a th:href="@{/librarian/addBook}">Add Books</a>
            <a th:href="@{/librarian/returnQueue}" class="active">Return Queue</a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1>Return Queue</h1>
            <p>All active and overdue reservations awaiting return</p>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="queue-count"
             th:if="${!reservations.isEmpty()}"
             th:text="${reservations.size()} + ' reservation(s) pending return'">
        </div>

        <div class="table-container" th:if="${!reservations.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Member</th>
                        <th>Book</th>
                        <th>Borrow Date</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r, iter : ${reservations}"
                        th:classappend="${r.status.name() == 'OVERDUE'} ? 'overdue-row' : ''">
                        <td th:text="${iter.count}">1</td>
                        <td class="member-info">
                            <div class="member-name" th:text="${r.user.name}">Name</div>
                            <div class="member-email" th:text="${r.user.email}">email</div>
                        </td>
                        <td class="book-title-cell" th:text="${r.book.title}">Title</td>
                        <td class="date-cell"
                            th:text="${#temporals.format(r.borrowDate, 'dd MMM yyyy')}">Date</td>
                        <td class="date-cell"
                            th:text="${#temporals.format(r.dueDate, 'dd MMM yyyy')}">Date</td>
                        <td>
                            <span th:if="${r.status.name() == 'ACTIVE'}"  class="badge badge-active">Active</span>
                            <span th:if="${r.status.name() == 'OVERDUE'}" class="badge badge-overdue">⚠ Overdue</span>
                        </td>
                        <td>
                            <form th:action="@{/librarian/markReturned}" method="post">
                                <input type="hidden" name="reservationId" th:value="${r.id}">
                                <button type="submit" class="btn-return">✓ Mark Returned</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${reservations.isEmpty()}">
            <div class="empty-icon">🎉</div>
            <p>The return queue is empty. All books are accounted for!</p>
        </div>
    </main>
</body>
</html>
