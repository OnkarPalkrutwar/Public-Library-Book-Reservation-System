<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reservations — Library System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 60%, #24243e 100%);
            color: #e0e0e0;
        }

        nav {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky; top: 0; z-index: 100;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; align-items: center; gap: 0.5rem; }

        .nav-links a, .nav-links button {
            padding: 0.45rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c4c9d6;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s, color 0.2s;
        }

        .nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-links a.active { background: rgba(102,126,234,0.2); color: #818cf8; }

        .logout-btn {
            background: rgba(239,68,68,0.15) !important;
            color: #fca5a5 !important;
            border: 1px solid rgba(239,68,68,0.3) !important;
        }

        main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.9rem; font-weight: 700; color: #f9fafb; }
        .page-header p { color: #9ca3af; font-size: 0.9rem; margin-top: 0.25rem; }

        /* Table */
        .table-container {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(255,255,255,0.06);
        }

        thead th {
            padding: 1rem 1.25rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #9ca3af;
        }

        tbody tr {
            border-top: 1px solid rgba(255,255,255,0.06);
            transition: background 0.15s;
        }

        tbody tr:hover { background: rgba(255,255,255,0.03); }

        tbody td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            color: #d1d5db;
            vertical-align: middle;
        }

        .book-info .book-title {
            font-weight: 600;
            color: #f3f4f6;
            font-size: 0.95rem;
        }

        .book-info .book-author {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 0.15rem;
        }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-active {
            background: rgba(59,130,246,0.15);
            color: #93c5fd;
            border: 1px solid rgba(59,130,246,0.3);
        }

        .badge-returned {
            background: rgba(16,185,129,0.12);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,0.25);
        }

        .badge-overdue {
            background: rgba(239,68,68,0.12);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
        }

        .date-cell { font-size: 0.85rem; color: #9ca3af; }

        .overdue-row { background: rgba(239,68,68,0.04) !important; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6b7280;
        }

        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty-state a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">📚 Library System</div>
        <div class="nav-links">
            <a th:href="@{/member/dashboard}">Dashboard</a>
            <a th:href="@{/member/catalogue}">Browse Books</a>
            <a th:href="@{/member/reservations}" class="active">My Reservations</a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1>My Reservations</h1>
            <p>Your full borrowing history</p>
        </div>

        <div class="table-container" th:if="${!reservations.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Book</th>
                        <th>Borrow Date</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r, iter : ${reservations}"
                        th:classappend="${r.status.name() == 'OVERDUE'} ? 'overdue-row' : ''">
                        <td th:text="${iter.count}">1</td>
                        <td class="book-info">
                            <div class="book-title" th:text="${r.book.title}">Title</div>
                            <div class="book-author" th:text="'by ' + ${r.book.author}">Author</div>
                        </td>
                        <td class="date-cell"
                            th:text="${#temporals.format(r.borrowDate, 'dd MMM yyyy')}">Date</td>
                        <td class="date-cell"
                            th:text="${#temporals.format(r.dueDate, 'dd MMM yyyy')}">Date</td>
                        <td>
                            <span th:if="${r.status.name() == 'ACTIVE'}"   class="badge badge-active">Active</span>
                            <span th:if="${r.status.name() == 'RETURNED'}" class="badge badge-returned">Returned</span>
                            <span th:if="${r.status.name() == 'OVERDUE'}"  class="badge badge-overdue">Overdue</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${reservations.isEmpty()}">
            <div class="empty-icon">📭</div>
            <p>You haven't borrowed any books yet.<br>
               <a th:href="@{/member/catalogue}">Browse the catalogue</a> to get started.
            </p>
        </div>
    </main>
</body>
</html>
