<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalogue — Library System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 60%, #24243e 100%);
            color: #e0e0e0;
        }

        nav {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky; top: 0; z-index: 100;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; align-items: center; gap: 0.5rem; }

        .nav-links a, .nav-links button {
            padding: 0.45rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c4c9d6;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s, color 0.2s;
        }

        .nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-links a.active { background: rgba(102,126,234,0.2); color: #818cf8; }

        .logout-btn {
            background: rgba(239,68,68,0.15) !important;
            color: #fca5a5 !important;
            border: 1px solid rgba(239,68,68,0.3) !important;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.9rem; font-weight: 700; color: #f9fafb; }
        .page-header p { color: #9ca3af; font-size: 0.9rem; margin-top: 0.25rem; }

        /* Alerts */
        .alert {
            padding: 0.85rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .alert-success {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }
        .alert-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        /* Search bar */
        .search-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .search-bar input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #f3f4f6;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.25);
        }

        .search-bar input::placeholder { color: #6b7280; }

        .btn-search {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }

        .clear-search {
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #9ca3af;
            font-size: 0.85rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .clear-search:hover { background: rgba(255,255,255,0.1); color: #d1d5db; }

        /* Results info */
        .results-info {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 1.25rem;
        }

        /* Book grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .book-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .book-card:hover {
            transform: translateY(-4px);
            border-color: rgba(102,126,234,0.4);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .book-cover {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .book-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f9fafb;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }

        .book-author {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 1rem;
        }

        .book-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .availability-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
        }

        .badge-available {
            background: rgba(16,185,129,0.15);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,0.3);
        }

        .badge-unavailable {
            background: rgba(239,68,68,0.12);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.25);
        }

        .copies-count {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .btn-borrow {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        .btn-borrow:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(102,126,234,0.4);
        }

        .btn-borrow:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
            color: #6b7280;
        }

        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">📚 Library System</div>
        <div class="nav-links">
            <a th:href="@{/member/dashboard}">Dashboard</a>
            <a th:href="@{/member/catalogue}" class="active">Browse Books</a>
            <a th:href="@{/member/reservations}">My Reservations</a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1>Book Catalogue</h1>
            <p>Search and borrow books from the library collection</p>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

        <!-- Search bar -->
        <form th:action="@{/member/catalogue}" method="get" class="search-bar">
            <input type="text"
                   id="search"
                   name="search"
                   th:value="${search}"
                   placeholder="Search by title or author…">
            <button type="submit" class="btn-search">🔍 Search</button>
            <a th:href="@{/member/catalogue}" class="clear-search">✕ Clear</a>
        </form>

        <div class="results-info" th:if="${search != null and !search.isEmpty()}">
            Showing results for "<strong th:text="${search}"></strong>"
            — <span th:text="${books.size()}">0</span> book(s) found
        </div>

        <!-- Book grid -->
        <div class="books-grid">
            <div th:each="book : ${books}" class="book-card">
                <div>
                    <div class="book-cover">📘</div>
                    <div class="book-title" th:text="${book.title}">Book Title</div>
                    <div class="book-author" th:text="'by ' + ${book.author}">Author</div>
                    <div class="book-meta">
                        <span th:if="${book.availableCopies > 0}"
                              class="availability-badge badge-available">Available</span>
                        <span th:if="${book.availableCopies == 0}"
                              class="availability-badge badge-unavailable">Unavailable</span>
                        <span class="copies-count"
                              th:text="${book.availableCopies} + ' cop' + (${book.availableCopies} == 1 ? 'y' : 'ies')">
                        </span>
                    </div>
                </div>
                <form th:action="@{/member/borrow}" method="post">
                    <input type="hidden" name="bookId" th:value="${book.id}">
                    
                    <div style="margin-bottom: 0.75rem;" th:if="${book.availableCopies > 0}">
                        <label style="display:block; font-size: 0.75rem; color:#9ca3af; margin-bottom: 0.2rem;">Select Due Date:</label>
                        <input type="date" name="dueDate" required
                               style="width: 100%; padding: 0.6rem; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #f3f4f6; font-family: 'Inter', sans-serif;">
                    </div>

                    <button type="submit"
                            class="btn-borrow"
                            th:disabled="${book.availableCopies == 0}">
                        Borrow this Book
                    </button>
                </form>
            </div>

            <div th:if="${books.isEmpty()}" class="empty-state">
                <div class="empty-icon">🔍</div>
                <p>No books found. Try a different search term.</p>
            </div>
        </div>
    </main>
</body>
</html>
